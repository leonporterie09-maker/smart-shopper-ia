<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShopper IA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen py-12 px-4 relative overflow-hidden bg-[#f0f4f8]">
    <div class="max-w-5xl mx-auto relative z-10">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-black text-gray-900 tracking-tighter mb-4">
                Smart<span class="text-blue-600">Shopper</span>
            </h1>
            <p class="text-gray-500 text-xl font-medium">Asistente de compras con IA</p>
        </div>

        <div class="max-w-2xl mx-auto mb-20">
            <div class="p-2 rounded-2xl shadow-2xl flex items-center bg-white/70 backdrop-blur-xl border border-white">
                <input id="productInput" type="text" placeholder="¿Qué quieres buscar hoy?" 
                       class="w-full bg-transparent p-4 outline-none text-xl text-gray-800">
                <button onclick="handleSearch()" id="btnSearch" class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">
                    Buscar
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="loader-ring mx-auto mb-6"></div>
            <p class="text-blue-600 font-bold uppercase text-xs">Analizando mercado...</p>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-8 opacity-0 transition-all duration-700">
            <div class="p-8 rounded-[2.5rem] bg-white border border-white shadow-xl">
                <div class="text-2xl mb-4">💰</div>
                <h3 class="font-bold text-gray-900 text-2xl mb-2">Precio</h3>
                <p id="res-price" class="text-gray-600 text-sm"></p>
            </div>
            <div class="p-8 rounded-[2.5rem] bg-white border border-white shadow-xl">
                <div class="text-2xl mb-4">⭐</div>
                <h3 class="font-bold text-gray-900 text-2xl mb-2">Calidad</h3>
                <p id="res-quality" class="text-gray-600 text-sm"></p>
            </div>
            <div class="p-8 rounded-[2.5rem] bg-white border border-white shadow-xl">
                <div class="text-2xl mb-4">🛡️</div>
                <h3 class="font-bold text-gray-900 text-2xl mb-2">Confianza</h3>
                <p id="res-trust" class="text-gray-600 text-sm"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
