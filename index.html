<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShopper IA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen py-12 px-4 relative overflow-hidden bg-[#f0f4f8]">
    
    <div class="circle-gradient absolute top-[-10%] left-[-10%] w-96 h-96 rounded-full blur-3xl opacity-20"></div>
    <div class="circle-gradient-alt absolute bottom-[-10%] right-[-10%] w-96 h-96 rounded-full blur-3xl opacity-20"></div>

    <div class="max-w-5xl mx-auto relative z-10">
        <div class="text-center mb-16">
            <div class="inline-block p-4 bg-white/40 backdrop-blur-md rounded-3xl shadow-xl mb-6">
                <span class="text-4xl">🛍️</span>
            </div>
            <h1 class="text-6xl font-black text-gray-900 tracking-tighter mb-4">
                Smart<span class="text-blue-600">Shopper</span>
            </h1>
            <p class="text-gray-500 text-xl font-medium">Asistente de compras con Inteligencia Artificial</p>
        </div>

        <div class="max-w-2xl mx-auto mb-20">
            <div class="glass-input p-2 rounded-2xl shadow-2xl flex items-center border border-white/50 bg-white/70 backdrop-blur-xl">
                <input id="productInput" type="text" placeholder="¿Qué quieres comprar hoy?" 
                       class="w-full bg-transparent p-4 outline-none text-xl text-gray-800 placeholder-gray-400">
                <button onclick="handleSearch()" id="btnSearch" class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-blue-700 hover:scale-105 transition-all shadow-lg shadow-blue-200">
                    Buscar
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-10 scale-up">
            <div class="loader-ring mx-auto mb-6"></div>
            <p class="text-blue-600 font-bold tracking-widest uppercase text-xs">Analizando mercado en tiempo real</p>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-8 opacity-0 transition-all duration-700 transform translate-y-10">
            <div class="card-premium p-8 rounded-[2.5rem] bg-white/80 backdrop-blur-md border border-white/50 shadow-xl">
                <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mb-6 text-2xl shadow-inner">💰</div>
                <h3 class="font-bold text-gray-900 text-2xl mb-4 tracking-tight">Mejor Precio</h3>
                <p id="res-price" class="text-gray-600 leading-relaxed text-sm"></p>
            </div>
            <div class="card-premium p-8 rounded-[2.5rem] bg-white/80 backdrop-blur-md border border-white/50 shadow-xl">
                <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center mb-6 text-2xl shadow-inner">⭐</div>
